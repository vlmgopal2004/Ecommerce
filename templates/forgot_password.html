{% extends 'base.html' %}
{% block title %}Forgot Password | E-Shop{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card shadow-lg animate__animated animate__fadeIn">

    <h3 class="auth-title">Forgot Password? 🤔</h3>
    <p class="auth-subtitle">Enter your email to receive a reset link</p>

    <form method="POST">
      <div class="form-floating mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email" required>
        <label>Email address</label>
      </div>

      <button class="btn btn-warning w-100 auth-btn">
        Send Reset Link
      </button>

      <p class="text-center mt-3">
        Remember your password? 
        <a href="/login" class="auth-link fw-semibold">Login</a>
      </p>

    </form>

  </div>
</div>
{% endblock %}
